name: backend Test
on: 
   push:
     branches: [main]
   pull_request:
jobs:
  tests:
    runs-on: ubuntu-22.04
    defaults:
      run:
        working-directory: backend
    steps:
    - name: setup
      uses: action/checkout@v4
    - name: Node setup 
      uses: actions/setup-node@v4
      with:
        node-version: 24.x
    - name: install dependencies
      run: npm ci 
    - name: Run all tests 
      run: npm test 
        
    
